name: Download from Commit & Save to Repo
on:
  push:
    branches:
      - "**"
jobs:
  save-file:
    if: contains(github.event.head_commit.message, 'download-zip-secret:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install required tools
        run: sudo apt-get update && sudo apt-get install -y aria2 zip

      - name: Extract and download with secret password
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          # استخراج دستور با فرمت: secret_name:zip_filename:url1 url2
          if echo "$MSG" | grep -qP 'download-zip-secret:'; then
            COMMAND=$(echo "$MSG" | grep -oP 'download-zip-secret:\s*\K.*')
            
            # تقسیم به سه بخش: secret_name | zip_filename | urls
            SECRET_NAME=$(echo "$COMMAND" | cut -d':' -f1)
            ZIP_NAME=$(echo "$COMMAND" | cut -d':' -f2)
            URL_LINE=$(echo "$COMMAND" | cut -d':' -f3-)
            
            echo "🔐 Using secret: $SECRET_NAME"
            echo "📛 Zip filename: $ZIP_NAME.zip"
            echo "🌐 URLs: $URL_LINE"
            
            # دریافت رمز از GitHub Secrets
            PASSWORD="${{ secrets[SECRET_NAME] }}"
            
            if [ -z "$PASSWORD" ]; then
              echo "❌ Error: Secret '$SECRET_NAME' not found!"
              echo "💡 Make sure you've added this secret in:"
              echo "   Repository -> Settings -> Secrets and variables -> Actions"
              exit 1
            fi
            
            mkdir -p downloads tmp_downloads
            
            # دانلود فایل‌ها
            for URL in $URL_LINE; do
              FILENAME=$(basename "$URL")
              echo "⬇️ Downloading $URL"
              aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=90M \
                --dir="tmp_downloads" \
                "$URL"
            done
            
            # ساخت zip رمزدار با نام دلخواه
            cd tmp_downloads
            zip -j -P "$PASSWORD" "../downloads/${ZIP_NAME}.zip" *
            cd ..
            
            echo "✅ Created password-protected zip: downloads/${ZIP_NAME}.zip"
            
            # پاک کردن فایل‌های موقت
            rm -rf tmp_downloads
          else
            echo "❌ No download-zip-secret command found in commit message"
            exit 1
          fi

      - name: Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add downloads/
          
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          
          git commit -m "Add password-protected zip file [skip ci]"
          git pull --rebase origin "$BRANCH"
          git push origin HEAD:"$BRANCH"
          
          echo "🎉 Successfully pushed encrypted zip file"

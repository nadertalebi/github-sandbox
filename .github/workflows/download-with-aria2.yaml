name: Download from Commit & Save to Repo
on:
  push:
    branches:
      - "**"
jobs:
  save-file:
    if: contains(github.event.head_commit.message, 'download-zip-secret:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install required tools
        run: sudo apt-get update && sudo apt-get install -y aria2 zip jq

      - name: Extract and download with secret password
        env:
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          # استخراج دستور
          if echo "$MSG" | grep -qP 'download-zip-secret:'; then
            COMMAND=$(echo "$MSG" | grep -oP 'download-zip-secret:\s*\K.*')
            
            SECRET_NAME=$(echo "$COMMAND" | cut -d':' -f1)
            ZIP_NAME=$(echo "$COMMAND" | cut -d':' -f2)
            URL_LINE=$(echo "$COMMAND" | cut -d':' -f3-)
            
            echo "🔐 Using secret: $SECRET_NAME"
            echo "📛 Zip filename: $ZIP_NAME.zip"
            
            # دریافت رمز از secrets با استفاده از jq
            PASSWORD=$(echo "$SECRETS_CONTEXT" | jq -r ".\"$SECRET_NAME\" // empty")
            
            if [ -z "$PASSWORD" ] || [ "$PASSWORD" = "null" ]; then
              echo "❌ Error: Secret '$SECRET_NAME' not found!"
              echo "💡 Make sure you've added this secret in:"
              echo "   Repository -> Settings -> Secrets and variables -> Actions"
              echo ""
              echo "📋 Current available secrets:"
              echo "$SECRETS_CONTEXT" | jq -r 'keys[]' | sed 's/^/   - /'
              exit 1
            fi
            
            mkdir -p downloads tmp_downloads
            
            # دانلود فایل‌ها
            for URL in $URL_LINE; do
              echo "⬇️ Downloading $URL"
              aria2c --split=2 --max-connection-per-server=2 \
                --min-split-size=90M --dir="tmp_downloads" "$URL"
            done
            
            # ساخت zip رمزدار
            cd tmp_downloads
            zip -j -e -P "$PASSWORD" "../downloads/${ZIP_NAME}.zip" *
            cd ..
            
            echo "✅ Created: downloads/${ZIP_NAME}.zip"
            rm -rf tmp_downloads
          else
            echo "❌ No download-zip-secret command found"
            exit 1
          fi

      - name: Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add downloads/
          
          if ! git diff --staged --quiet; then
            git commit -m "Add encrypted zip file [skip ci]"
            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"
            echo "🎉 Successfully pushed"
          else
            echo "Nothing to commit"
          fi
